<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditLab Live Prototype Display</title>
    <style>
        /* Modern, clean dark theme to match AuditLab */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0f1d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar Indicator for Judges */
        .status-bar {
            background-color: #131a30;
            color: #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #242f50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff87; /* Neon green pulse color */
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff87;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff87;
        }

        /* Centered Canva Container */
        .embed-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Smooth Responsive Iframe */
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>📄 AuditLab Portal — Live Interactive Prototype</div>
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span>System Active (View-Only Sandbox)</span>
        </div>
    </div>

    <div class="embed-container">
        <iframe loading="lazy" src="<iframe src="https://scratch.mit.edu/projects/707099493/embed" allowtransparency="true" width="485" height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
        
        </div>

</body>
</html>
