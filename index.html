<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditLab Live Prototype Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0f1d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background-color: #131a30;
            color: #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #242f50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff87;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff87;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff87;
        }

        .embed-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Adjusts specifically to keep Scratch's default player size clean */
        .embed-container iframe {
            width: 485px;
            height: 402px;
            border: none;
            background-color: #131a30;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>📄 AuditLab Portal — Live Scratch Prototype</div>
        <div class="status-indicator">
            <div class="pulse-dot"></div>
            <span>System Active</span>
        </div>
    </div>

    <div class="embed-container">
        <iframe src="https://scratch.mit.edu/projects/707099493/embed" allowtransparency="true" width="485" height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>
    </div>

</body>
</html>
